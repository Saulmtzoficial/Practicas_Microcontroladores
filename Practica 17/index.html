<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PicoChat</title>
<style>
:root {
  --bg:       #0b0f0d;
  --panel:    #11161a;
  --line:     #1f2a30;
  --text:     #d6e0db;
  --muted:    #6b7d76;
  --accent:   #7fff9c;
  --propio:   #1a3a2a;
  --ajeno:    #1c2630;
  --shadow:   0 2px 8px rgba(0,0,0,.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  overflow: hidden;
}

body { display: flex; flex-direction: column; }

header {
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
}

header::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0,
    transparent 3px,
    rgba(255,255,255,0.015) 3px,
    rgba(255,255,255,0.015) 4px
  );
  pointer-events: none;
}

.dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulso 1.6s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulso {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.35; }
}

.titulo { flex: 1; display: flex; flex-direction: column; }

.titulo h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.05em;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  color: var(--accent);
}

.titulo small {
  font-size: 11px;
  color: var(--muted);
  font-family: ui-monospace, monospace;
}

.btn-nombre {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--muted);
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-family: ui-monospace, monospace;
  cursor: pointer;
}

.btn-nombre:active { background: var(--line); }

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

.aviso {
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  font-family: ui-monospace, monospace;
  padding: 30px 16px;
  line-height: 1.6;
}

.msg {
  max-width: 78%;
  padding: 8px 12px 6px;
  border-radius: 14px;
  word-wrap: break-word;
  box-shadow: var(--shadow);
  animation: aparecer 0.25s ease-out;
}

@keyframes aparecer {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.propio {
  background: var(--propio);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
  border: 1px solid #2a5240;
}

.msg.ajeno {
  background: var(--ajeno);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  border: 1px solid var(--line);
}

.msg .usuario {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 2px;
  font-family: ui-monospace, monospace;
}

.msg.propio .usuario { color: #b8ffc8; }

.msg .texto {
  font-size: 14.5px;
  line-height: 1.35;
  color: var(--text);
}

.msg .hora {
  font-size: 9.5px;
  color: var(--muted);
  text-align: right;
  margin-top: 3px;
  font-family: ui-monospace, monospace;
}

form {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--panel);
  border-top: 1px solid var(--line);
}

#texto {
  flex: 1;
  padding: 11px 14px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 22px;
  color: var(--text);
  font-size: 14.5px;
  outline: none;
  font-family: inherit;
}

#texto:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(127,255,156,0.12);
}

#texto::placeholder { color: var(--muted); }

#enviar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #0a1410;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.1s;
}

#enviar:active { transform: scale(0.92); }
#enviar:disabled { opacity: 0.4; }
</style>
</head>
<body>

<header>
  <div class="dot" id="estado"></div>
  <div class="titulo">
    <h1>PicoChat</h1>
    <small id="info">conectando...</small>
  </div>
  <button class="btn-nombre" id="btnNombre" type="button">cambiar nombre</button>
</header>

<div id="chat">
  <div class="aviso" id="aviso">
    Servidor: Raspberry Pi Pico W<br>
    Esperando mensajes...
  </div>
</div>

<!-- El handler del submit se registra desde JS con addEventListener -->
<form id="form">
  <input id="texto" type="text" placeholder="Escribe un mensaje..."
         autocomplete="off" maxlength="200" required>
  <button id="enviar" type="submit" aria-label="Enviar">&#9658;</button>
</form>

<script>
// =====================================================
// PicoChat - cliente
// =====================================================
// Polling cada 1.5 s al endpoint /mensajes. El servidor
// responde solo con los mensajes con id > ultimoId.

// ----- Identificacion de usuario -----
let usuario = localStorage.getItem("picochat_usuario");
if (!usuario) {
  usuario = (prompt("Como te llamas?") || "Anonimo").trim().slice(0, 20) || "Anonimo";
  localStorage.setItem("picochat_usuario", usuario);
}
document.getElementById("info").textContent = "tu: " + usuario;

document.getElementById("btnNombre").addEventListener("click", function () {
  const nuevo = (prompt("Nuevo nombre:", usuario) || "").trim().slice(0, 20);
  if (nuevo) {
    usuario = nuevo;
    localStorage.setItem("picochat_usuario", usuario);
    document.getElementById("info").textContent = "tu: " + usuario;
  }
});

// ----- Variables de estado -----
let ultimoId  = 0;
let conectado = false;
const chat    = document.getElementById("chat");
const aviso   = document.getElementById("aviso");
const estado  = document.getElementById("estado");

// ----- Hora local (la Pico W no tiene RTC) -----
function ahora() {
  const d = new Date();
  return String(d.getHours()).padStart(2, "0") + ":" +
         String(d.getMinutes()).padStart(2, "0");
}

// ----- Pintar un mensaje (textContent para evitar XSS) -----
function pintar(m) {
  if (aviso && aviso.parentNode) aviso.remove();
  const div = document.createElement("div");
  div.className = "msg " + (m.usuario === usuario ? "propio" : "ajeno");
  const u = document.createElement("div");
  u.className = "usuario"; u.textContent = m.usuario;
  const t = document.createElement("div");
  t.className = "texto";   t.textContent = m.texto;
  const h = document.createElement("div");
  h.className = "hora";    h.textContent = ahora();
  div.appendChild(u); div.appendChild(t); div.appendChild(h);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ----- Indicador de conexion -----
function marcarConexion(ok) {
  if (ok === conectado) return;
  conectado = ok;
  estado.style.background = ok ? "var(--accent)" : "#ff5b6b";
  estado.style.boxShadow  = ok ? "0 0 8px var(--accent)" : "0 0 8px #ff5b6b";
}

// ----- Pedir mensajes nuevos -----
function actualizar() {
  return fetch("/mensajes?desde=" + ultimoId)
    .then(function (r) { return r.json(); })
    .then(function (d) {
      d.mensajes.forEach(pintar);
      if (d.ultimo > ultimoId) ultimoId = d.ultimo;
      marcarConexion(true);
    })
    .catch(function () { marcarConexion(false); });
}

// ----- Enviar mensaje -----
function enviar(texto) {
  return fetch("/enviar", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ usuario: usuario, texto: texto })
  })
  .then(function () { return actualizar(); })
  .then(function () { return true; })
  .catch(function (e) {
    console.log("Error al enviar:", e);
    marcarConexion(false);
    return false;
  });
}

// ----- FIX: registramos el submit con addEventListener.
// Asi tenemos control total de preventDefault, sin depender
// del valor que devuelva una funcion async (que era el bug).
document.getElementById("form").addEventListener("submit", function (ev) {
  ev.preventDefault();
  const input = document.getElementById("texto");
  const btn   = document.getElementById("enviar");
  const texto = input.value.trim();
  if (!texto) return;
  btn.disabled = true;
  input.value  = "";
  enviar(texto).then(function (ok) {
    if (!ok) input.value = texto;
    btn.disabled = false;
    input.focus();
  });
});

// ----- Arranque -----
actualizar();
setInterval(actualizar, 1500);
</script>
</body>
</html>
